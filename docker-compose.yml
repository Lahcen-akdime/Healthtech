version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/dockerfile
    container_name: app_container
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: pgsql
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_DATABASE: healthtech
      DB_USERNAME: postgres
      DB_PASSWORD: lahcen2025
    depends_on:
      - postgres_db

  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres_db:
    image: postgres:16
    container_name: traitement_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: healthtech
      POSTGRES_PASSWORD: lahcen2025
    ports:
      - "5432:5432"
    volumes:
      - healthtech_data:/var/lib/postgresql/data

volumes:
  healthtech_data: