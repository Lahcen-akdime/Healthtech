name: Laravel CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: الاختبارات
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      postgres_db:
        image: postgres:16
        env:
          POSTGRES_DB: healthtech
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: lahcen2025
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_pgsql, bcmath, gd, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Migrations and Tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: healthtech
          DB_USERNAME: postgres
          DB_PASSWORD: lahcen2025
        run: |
          php artisan migrate --force
          php artisan test

  # Job 2: اختبار الاتصال (لاحظ أنه يبدأ من أقصى اليسار مثل الجوب الأول)
  test-ssh-connection:
    runs-on: ubuntu-latest
    needs: laravel-tests 
    steps:
      - name: Testing SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 16.171.235.84
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Connection Successful!"
            whoami
            uptime
            ls -la /var/www/html